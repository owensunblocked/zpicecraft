<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ZpiceCraft</title>
<style>
  body { margin: 0; overflow: hidden; }
  canvas { display: block; }

  #ui {
    position: absolute;
    top: 10px;
    left: 10px;
    padding: 10px;
    background: rgba(0,0,0,0.5);
    color: white;
    display: none;
    font-family: sans-serif;
  }
  #crosshair {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 6px;
    height: 6px;
    margin-left: -3px;
    margin-top: -3px;
    background: white;
    border-radius: 50%;
  }
</style>
</head>
<body>

<div id="ui">Inventory: Dirt</div>
<div id="crosshair"></div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// lighting
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444));

// ===== PLAYER =====
let player = {
  x: 0,
  y: 2,
  z: 5,
  velocityY: 0,
  onGround: false,
  yaw: 0,
  pitch: 0
};

// ===== BLOCKS =====
let blocks = [];

function addBlock(x,y,z){
  const cube = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshLambertMaterial({color:0x8B5A2B})
  );
  cube.position.set(x,y,z);
  scene.add(cube);
  blocks.push(cube);
}

// world
for(let x=-10;x<10;x++){
  for(let z=-10;z<10;z++){
    addBlock(x,-1,z);
  }
}

// ===== INPUT =====
let keys = {};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

// inventory
document.addEventListener("keydown",e=>{
  if(e.key.toLowerCase()==="e"){
    let ui=document.getElementById("ui");
    ui.style.display = ui.style.display==="none"?"block":"none";
  }
});

// ===== MOUSE LOOK (NO POINTERLOCK FILE) =====
let locked = false;

document.addEventListener("click",()=>{
  document.body.requestPointerLock();
});

document.addEventListener("pointerlockchange",()=>{
  locked = document.pointerLockElement === document.body;
});

document.addEventListener("mousemove",e=>{
  if(!locked) return;

  player.yaw -= e.movementX * 0.002;
  player.pitch -= e.movementY * 0.002;

  player.pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, player.pitch));
});

// ===== RAYCAST =====
const raycaster = new THREE.Raycaster();

function getHit(){
  const dir = new THREE.Vector3(
    Math.sin(player.yaw)*Math.cos(player.pitch),
    Math.sin(player.pitch),
    Math.cos(player.yaw)*Math.cos(player.pitch)
  );

  raycaster.set(
    new THREE.Vector3(player.x, player.y, player.z),
    dir
  );

  return raycaster.intersectObjects(blocks)[0];
}

// break/place
document.addEventListener("mousedown",e=>{
  let hit = getHit();
  if(!hit) return;

  if(e.button===0){
    scene.remove(hit.object);
    blocks = blocks.filter(b=>b!==hit.object);
  }

  if(e.button===2){
    let p = hit.object.position.clone().add(hit.face.normal);
    p.x=Math.round(p.x);
    p.y=Math.round(p.y);
    p.z=Math.round(p.z);
    addBlock(p.x,p.y,p.z);
  }
});

document.addEventListener("contextmenu",e=>e.preventDefault());

// ===== GAME LOOP =====
function update(){

  let speed = keys["shift"] ? 0.15 : 0.08;

  let forward = new THREE.Vector3(
    Math.sin(player.yaw),
    0,
    Math.cos(player.yaw)
  );

  let right = new THREE.Vector3(
    Math.sin(player.yaw - Math.PI/2),
    0,
    Math.cos(player.yaw - Math.PI/2)
  );

  if(keys["w"]) { player.x += forward.x*speed; player.z += forward.z*speed; }
  if(keys["s"]) { player.x -= forward.x*speed; player.z -= forward.z*speed; }
  if(keys["a"]) { player.x += right.x*speed; player.z += right.z*speed; }
  if(keys["d"]) { player.x -= right.x*speed; player.z -= right.z*speed; }

  // jump
  if(keys[" "] && player.onGround){
    player.velocityY = 0.2;
    player.onGround = false;
  }

  // gravity
  player.velocityY -= 0.01;
  player.y += player.velocityY;

  if(player.y < 2){
    player.y = 2;
    player.velocityY = 0;
    player.onGround = true;
  }

  // camera rotation
  camera.rotation.order = "YXZ";
  camera.rotation.y = player.yaw;
  camera.rotation.x = player.pitch;

  camera.position.set(player.x, player.y, player.z);
}

function animate(){
  requestAnimationFrame(animate);
  update();
  renderer.render(scene,camera);
}

animate();

window.addEventListener("resize",()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
