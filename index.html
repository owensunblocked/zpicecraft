<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ZpiceCraft</title>
<style>
  body { margin: 0; overflow: hidden; }
  canvas { display: block; }

  #ui {
    position: absolute;
    top: 10px;
    left: 10px;
    padding: 10px;
    background: rgba(0,0,0,0.5);
    color: white;
    font-family: sans-serif;
    display: none;
  }

  #crosshair {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 6px;
    height: 6px;
    margin-left: -3px;
    margin-top: -3px;
    background: white;
    border-radius: 50%;
  }
</style>
</head>
<body>

<div id="ui">Inventory: Dirt</div>
<div id="crosshair"></div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.160.0/examples/js/controls/PointerLockControls.js"></script>

<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// controls
const controls = new THREE.PointerLockControls(camera, document.body);
scene.add(controls.getObject());

document.addEventListener("click", () => controls.lock());

// lighting
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444));

// blocks
let blocks = [];

function addBlock(x, y, z) {
  const cube = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshLambertMaterial({ color: 0x8B5A2B })
  );
  cube.position.set(x,y,z);
  scene.add(cube);
  blocks.push(cube);
}

// world
for (let x=-10;x<10;x++){
  for (let z=-10;z<10;z++){
    addBlock(x,-1,z);
  }
}

// movement
let keys = {};
document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// inventory
document.addEventListener("keydown", e => {
  if (e.key.toLowerCase() === "e") {
    let ui = document.getElementById("ui");
    ui.style.display = ui.style.display === "none" ? "block" : "none";
  }
});

// physics
let velocityY = 0;
let gravity = -0.01;
let onGround = false;

// raycast
const raycaster = new THREE.Raycaster();

function getHit() {
  const center = new THREE.Vector2(0,0);
  raycaster.setFromCamera(center, camera);
  return raycaster.intersectObjects(blocks)[0];
}

// place / break
document.addEventListener("mousedown", e => {
  const hit = getHit();
  if (!hit) return;

  if (e.button === 0) {
    scene.remove(hit.object);
    blocks = blocks.filter(b => b !== hit.object);
  }

  if (e.button === 2) {
    const pos = hit.object.position.clone().add(hit.face.normal);
    pos.x = Math.round(pos.x);
    pos.y = Math.round(pos.y);
    pos.z = Math.round(pos.z);
    addBlock(pos.x, pos.y, pos.z);
  }
});

document.addEventListener("contextmenu", e => e.preventDefault());

// start position
camera.position.set(0,2,5);

// loop
function animate() {
  requestAnimationFrame(animate);

  let speed = keys["shift"] ? 0.15 : 0.08;

  if (controls.isLocked) {
    if (keys["w"]) controls.moveForward(speed);
    if (keys["s"]) controls.moveForward(-speed);
    if (keys["a"]) controls.moveRight(-speed);
    if (keys["d"]) controls.moveRight(speed);

    // jump
    if (keys[" "] && onGround) {
      velocityY = 0.2;
      onGround = false;
    }

    // gravity
    velocityY += gravity;
    camera.position.y += velocityY;

    // ground collision
    if (camera.position.y < 2) {
      camera.position.y = 2;
      velocityY = 0;
      onGround = true;
    }
  }

  renderer.render(scene, camera);
}

animate();

// resize
window.addEventListener("resize", () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
